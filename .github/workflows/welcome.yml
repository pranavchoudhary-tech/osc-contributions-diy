name: Welcome First-Time Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hey there! Thanks for opening your first issue here.
            A maintainer will look into this soon.
            While you wait, check out our [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) to get started with contributing!
          pr-message: |
            🎉 Congrats on your first Pull Request!
            Thanks for contributing — a maintainer will review it shortly.
            Make sure you've gone through the checklist in the PR template. Good luck! 🚀
